site_name: ChatGuard
site_description: Secure messaging without servers

repo_url: https://github.com/amirroid/chatguard
repo_name: amirroid/chatguard

markdown_extensions:
  - attr_list
  - md_in_html
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite

theme:
  name: material

  icon:
    logo: material/shield-lock

  palette:
    # Light mode (system preference)
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/weather-night
        name: Dark mode

    # Dark mode (system preference)
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/weather-sunny
        name: Light mode

  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight

extra_css:
  - stylesheets/extra.css

plugins:
  - search

  - i18n:
      docs_structure: folder
      languages:
        - locale: en
          default: true
          name: English
          build: true

          site_name: ChatGuard
          site_description: Secure messaging without servers

          nav:
            - Home: index.md
            - How To Use: how-to-use.md
            - How It Works: how-it-works.md
            - Contributing: contributing.md

        - locale: fa
          name: فارسی
          build: true

          site_name: چت‌گارد
          site_description: پیام‌رسانی امن بدون نیاز به سرور

          nav:
            - خانه: index.md
            - راهنمای استفاده: how-to-use.md
            - نحوه عملکرد: how-it-works.md
            - مشارکت در پروژه: contributing.md